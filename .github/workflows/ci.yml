name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: pactum
          POSTGRES_PASSWORD: pactum
          POSTGRES_DB: pactum
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy --strict pactum/

      - name: Run migrations
        env:
          GROQ_API_KEY: dummy-key-for-ci
        run: uv run alembic upgrade head

      - name: Test
        env:
          GROQ_API_KEY: dummy-key-for-ci
        run: uv run pytest
